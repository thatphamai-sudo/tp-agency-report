<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Báo cáo tổng kết tháng • TP Nexus</title>
<style>
:root{--gold:#c9a14a;--dark:#11151c;--dark2:#1c2330}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f3f4f7;margin:0;color:#1f2937}.wrap{max-width:680px;margin:0 auto;padding:26px}
.hd{background:linear-gradient(135deg,var(--dark),var(--dark2));color:#fff;border-radius:16px;padding:24px;margin-bottom:18px;position:relative;overflow:hidden}
.hd-in{position:relative;z-index:2}
.fx{position:absolute;inset:0;pointer-events:none;z-index:0}
.fx-grid{background-image:linear-gradient(rgba(201,161,74,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(201,161,74,.05) 1px,transparent 1px);background-size:32px 32px;-webkit-mask-image:radial-gradient(140% 120% at 50% 0,#000,transparent 82%);mask-image:radial-gradient(140% 120% at 50% 0,#000,transparent 82%);animation:gridpan 26s linear infinite}
@keyframes gridpan{to{background-position:0 32px}}
.fx-aurora{background:conic-gradient(from 0deg at 82% 8%,transparent 0deg,rgba(201,161,74,.12) 40deg,transparent 110deg,rgba(150,190,255,.06) 200deg,transparent 300deg);mix-blend-mode:screen;animation:spin 30s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fx-glow{background:radial-gradient(55% 70% at 80% -10%,rgba(201,161,74,.13),transparent 72%);animation:glowpulse 10s ease-in-out infinite}
@keyframes glowpulse{0%,100%{opacity:.5}50%{opacity:.9}}
.fx-sheen{position:absolute;top:0;bottom:0;width:55%;left:-60%;z-index:1;background:linear-gradient(100deg,transparent,rgba(255,236,180,.08),transparent);animation:sheen 8s ease-in-out infinite}
@keyframes sheen{0%{left:-60%}55%,100%{left:140%}}
.dot{position:absolute;border-radius:50%;background:rgba(243,215,127,.55);z-index:1;box-shadow:0 0 6px rgba(243,215,127,.5);animation:drift 12s ease-in-out infinite}
@keyframes drift{0%,100%{transform:translateY(0);opacity:.15}50%{transform:translateY(-9px);opacity:.7}}
.brand-hero{text-align:center}
.brand-hero .blogo{max-width:200px;width:64%;height:auto;filter:drop-shadow(0 6px 22px rgba(201,161,74,.22))}
.wordmark{font-size:22px;font-weight:800;letter-spacing:.5px}
.wordmark .t{background:linear-gradient(135deg,#aab0b8,#f2f5f8);-webkit-background-clip:text;background-clip:text;color:transparent}
.wordmark .n{background:linear-gradient(135deg,#caa14a,#f3d77f);-webkit-background-clip:text;background-clip:text;color:transparent}
.tagline{font-size:10.5px;letter-spacing:2px;color:#caa14a;text-transform:uppercase;margin-top:4px}
.hd h1{font-size:17px;margin:16px 0 0;font-weight:600;opacity:.95}
@media (prefers-reduced-motion:reduce){.fx-grid,.fx-glow,.dot{animation:none}}
.cust{background:#fff;border:1px solid #e8eaee;border-radius:12px;padding:15px 18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(17,21,28,.04)}
.cust b{font-size:15px}.c{color:#6b7280;font-size:13px;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
a.chip{display:inline-block;padding:6px 13px;border-radius:999px;border:1px solid var(--gold);color:#8a6a24;background:#fdf8ec;text-decoration:none;font-size:13px;font-weight:600}
a.chip:hover{background:var(--gold);color:#fff}
.none{color:#9ca3af;font-size:13px;font-style:italic}
a.back{display:inline-block;margin-bottom:14px;color:#8a6a24;text-decoration:none;font-size:13.5px;font-weight:600}
a.back:hover{text-decoration:underline}
</style></head><body><div class="wrap">
<div class="hd"><div class="fx fx-grid"></div><div class="fx fx-aurora"></div><div class="fx fx-glow"></div><div class="fx-sheen"></div><span class="dot" style="left:10%;top:34%;width:3px;height:3px;animation-delay:0s"></span><span class="dot" style="left:84%;top:26%;width:2px;height:2px;animation-delay:2.4s"></span><span class="dot" style="left:64%;top:66%;width:2.5px;height:2.5px;animation-delay:4s"></span><span class="dot" style="left:27%;top:74%;width:2px;height:2px;animation-delay:1.2s"></span><span class="dot" style="left:47%;top:20%;width:1.6px;height:1.6px;animation-delay:3s"></span><span class="dot" style="left:92%;top:58%;width:2.2px;height:2.2px;animation-delay:5.5s"></span><span class="dot" style="left:18%;top:54%;width:1.6px;height:1.6px;animation-delay:1.8s"></span><span class="dot" style="left:73%;top:42%;width:1.4px;height:1.4px;animation-delay:3.6s"></span><div class="hd-in"><div class="brand brand-hero">
  <img class="blogo" src="../logo.png" alt="TP Nexus" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
  <div class="bfall" style="display:none"><div class="wordmark"><span class="t">TP</span> <span class="n">Nexus</span></div><div class="tagline">Hội tụ • Tinh gọn • Bứt phá</div></div>
</div>
<h1>🗓 Báo cáo tổng kết tháng — dịch vụ khách hàng</h1></div></div>
<a class="back" href="../index.html">← Về trang báo cáo ngày</a>
<div id="list"></div>
<script>
const CUST=[
 {code:'TP202',name:'HD ZENCARE',full:'TP202 | HD ZENCARE'},
 {code:'TP203',name:'PKĐK THẢO TIÊN',full:'TP203 | PKĐK THẢO TIÊN'},
 {code:'TP204',name:'SPA MIỀN NHIỆT ĐỚI',full:'TP204 | SPA MIỀN NHIỆT ĐỚI'},
 {code:'TP258',name:'Cơ Khí Đình Giang',full:'TP258 | Cơ Khí Đình Giang'},
 {code:'TP260',name:'CÔNG TY SRV',full:'TP260 | CÔNG TY SRV'}
];
const YEARS=[2026,2027];
const list=document.getElementById('list');
(async()=>{
 for(const c of CUST){
  const div=document.createElement('div');div.className='cust';
  div.innerHTML='<b>'+c.name+'</b><div class="c">'+c.full+'</div><div class="chips">Đang tải…</div>';
  list.appendChild(div);
  const chips=[];
  for(const y of YEARS){
   for(let m=1;m<=12;m++){
    const f=c.code+'-T'+m+'-'+y+'.html';
    try{
     const r=await fetch(f,{cache:'no-store'});
     if(!r.ok)continue;
     const t=await r.text();
     // bỏ qua file placeholder (chưa có báo cáo thật)
     if(t.includes('<!--placeholder-->')||t.length<2000)continue;
     chips.push('<a class="chip" href="'+f+'" target="_blank" rel="noopener">Tháng '+m+'/'+y+'</a>');
    }catch(e){}
   }
  }
  div.querySelector('.chips').innerHTML=chips.length?chips.join(''):'<span class="none">Chưa có báo cáo tháng nào</span>';
 }
})();
</script>
</div></body></html>
